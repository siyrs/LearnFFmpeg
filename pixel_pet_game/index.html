<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Pet Game</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-container {
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        canvas {
            background-color: #ecf0f1;
            border: 4px solid #bdc3c7;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .stats {
            text-align: left;
            background-color: #2c3e50;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .stats p {
            margin: 5px 0;
        }

        .controls {
            display: flex;
            justify-content: space-around;
        }

        button {
            background-color: #1abc9c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-family: inherit;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #16a085;
        }

        button:active {
            background-color: #1abc9c;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Pixel Pet</h1>

        <canvas id="gameCanvas" width="200" height="200"></canvas>

        <div id="stats" class="stats">
            <!-- Stats will be injected here by JS -->
        </div>

        <div class="controls">
            <button id="btn-feed">Feed 🥩</button>
            <button id="btn-play">Play 🎾</button>
            <button id="btn-sleep">Sleep 💤</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
