<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Pet Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c3e50;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 9/16;
            background-color: #ecf0f1;
            border: 4px solid #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            border-radius: 10px;
        }
        @media (min-aspect-ratio: 1/1) {
            #game-container {
                aspect-ratio: 16/9;
                max-width: 800px;
            }
        }
        #game-canvas {
            flex-grow: 1;
            width: 100%;
            image-rendering: pixelated;
        }
        #ui-panel {
            height: 20%;
            background-color: #bdc3c7;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 4px solid #34495e;
            padding: 5px;
            box-sizing: border-box;
        }
        .btn {
            background-color: #e74c3c;
            color: white;
            border: 2px solid #c0392b;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            user-select: none;
            touch-action: manipulation;
            font-family: 'Courier New', Courier, monospace;
        }
        .btn:active {
            background-color: #c0392b;
            transform: scale(0.95);
        }
        #stats-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border: 2px solid #34495e;
            border-radius: 5px;
            font-size: 14px;
            pointer-events: none;
        }
        .stat-bar-container {
            width: 100px;
            height: 10px;
            background-color: #7f8c8d;
            margin-top: 2px;
            border: 1px solid #2c3e50;
        }
        .stat-bar {
            height: 100%;
            background-color: #2ecc71;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="stats-panel">
            <div>Hunger: <div class="stat-bar-container"><div id="hunger-bar" class="stat-bar"></div></div></div>
            <div>Happiness: <div class="stat-bar-container"><div id="happiness-bar" class="stat-bar"></div></div></div>
            <div>Energy: <div class="stat-bar-container"><div id="energy-bar" class="stat-bar"></div></div></div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="ui-panel">
            <button class="btn" id="feed-btn">Feed</button>
            <button class="btn" id="play-btn">Play</button>
            <button class="btn" id="sleep-btn">Sleep</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
