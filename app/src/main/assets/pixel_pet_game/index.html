<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Pet Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>Pixel Pet</h1>
        <canvas id="gameCanvas" width="300" height="300"></canvas>

        <div id="controls">
            <button id="feedBtn">Feed</button>
            <button id="playBtn">Play</button>
            <button id="sleepBtn">Sleep</button>
        </div>

        <div id="status">
            <p>Hunger: <span id="hungerValue">50</span>/100</p>
            <p>Happiness: <span id="happinessValue">50</span>/100</p>
            <p>Energy: <span id="energyValue">100</span>/100</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
