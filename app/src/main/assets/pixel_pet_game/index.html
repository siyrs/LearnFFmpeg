<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pixel Pet Game</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f0f0f0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: 600px; max-height: 800px; background-color: #87CEEB; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        #ui { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        button { pointer-events: auto; padding: 10px 20px; font-size: 16px; border: 2px solid #000; background-color: #fff; cursor: pointer; border-radius: 8px; font-weight: bold; }
        button:active { background-color: #ccc; }
        #stats { position: absolute; top: 10px; left: 10px; background: rgba(255, 255, 255, 0.8); padding: 10px; border: 2px solid #000; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="stats">
            <div>Hunger: <span id="hunger">100</span></div>
            <div>Happiness: <span id="happiness">100</span></div>
            <div>Age: <span id="age">0</span></div>
        </div>
        <div id="ui">
            <button id="feedBtn">Feed</button>
            <button id="playBtn">Play</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
