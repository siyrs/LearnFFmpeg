<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Pet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>Pixel Pet</h1>
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <div id="stats">
            <div>Hunger: <span id="hunger">100</span></div>
            <div>Happiness: <span id="happiness">100</span></div>
            <div>Energy: <span id="energy">100</span></div>
        </div>
        <div id="controls">
            <button id="btn-feed">Feed</button>
            <button id="btn-play">Play</button>
            <button id="btn-sleep">Sleep</button>
        </div>
        <div id="message">Welcome!</div>
    </div>
    <script src="game.js"></script>
</body>
</html>
