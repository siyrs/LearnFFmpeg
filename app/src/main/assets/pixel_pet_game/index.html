<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Pet Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            background-color: #87CEEB; /* Sky blue */
            border: 4px solid #333;
            border-radius: 8px;
            image-rendering: pixelated; /* Essential for pixel art */
            max-width: 100%;
            max-height: 80vh;
        }
        #controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: white;
            background-color: #4CAF50;
            border: 2px solid #333;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 2px 2px 0 #333;
            transition: transform 0.1s;
        }
        button:active {
            transform: translate(2px, 2px);
            box-shadow: 0 0 0 #333;
        }
        #stats {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="stats">Happiness: <span id="happiness">100</span>% | Hunger: <span id="hunger">0</span>%</div>
    <canvas id="gameCanvas" width="240" height="160"></canvas>
    <div id="controls">
        <button id="feedBtn">Feed</button>
        <button id="playBtn">Play</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
