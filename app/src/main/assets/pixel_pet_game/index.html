<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Pet Game</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #2c3e50;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }
        h1 {
            margin-bottom: 10px;
        }
        #gameCanvas {
            background-color: #95a5a6;
            border: 4px solid #34495e;
            border-radius: 8px;
            image-rendering: pixelated; /* Important for crisp pixel art */
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px #c0392b;
            transition: all 0.1s;
        }
        button:active {
            box-shadow: 0 0 #c0392b;
            transform: translateY(4px);
        }
        .stats {
            margin-top: 15px;
            display: flex;
            gap: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Pixel Pet</h1>

    <div class="stats">
        <div>Hunger: <span id="hungerValue">50</span>%</div>
        <div>Happiness: <span id="happinessValue">50</span>%</div>
    </div>

    <canvas id="gameCanvas" width="300" height="300"></canvas>

    <div class="controls">
        <button id="btnFeed">Feed</button>
        <button id="btnPlay">Play</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
