<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Pet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        <div id="stats">
            <div class="stat">Hunger: <span id="hunger-val">100</span></div>
            <div class="stat">Happiness: <span id="happiness-val">100</span></div>
            <div class="stat">Energy: <span id="energy-val">100</span></div>
        </div>
        <div id="controls">
            <button id="feed-btn">Feed</button>
            <button id="play-btn">Play</button>
            <button id="sleep-btn">Sleep</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
