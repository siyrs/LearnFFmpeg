<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Pet Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="256" height="256"></canvas>
        <div id="ui-container">
            <div id="stats">
                <div class="stat">Hunger: <span id="hunger">100</span></div>
                <div class="stat">Happiness: <span id="happiness">100</span></div>
                <div class="stat">Energy: <span id="energy">100</span></div>
            </div>
            <div id="controls">
                <button id="btn-feed">Feed</button>
                <button id="btn-play">Play</button>
                <button id="btn-sleep">Sleep</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
